services:
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirofish
    env_file:
      - .env
    environment:
      - USE_LOCAL_MODE=true
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001
      # Cursor Agent: use 'agent' (installed by cursor.com/install)
      - CURSOR_AGENT_PATH=agent
    ports:
      - "3000:3000"
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
